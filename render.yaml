services:
  - type: web
    name: claude-working-memory
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn memory_server:app --bind 0.0.0.0:$PORT
    disk:
      name: claude-memory-disk
      mountPath: /mnt/data
      sizeGB: 1
    envVars:
      - key: CLAUDE_MEMORY_KEY
        sync: false
